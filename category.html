<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://szouczgiuhedynyshpbb.supabase.co" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0e17;
      --surface:   #111827;
      --surface-h: #161e2e;
      --border:    #1f2937;
      --border-h:  #374151;
      --text:      #f9fafb;
      --sub:       #6b7280;
      --sub2:      #9ca3af;
      --accent:    #3b82f6;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(10,14,23,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-wrap {
      max-width: 1160px; margin: auto;
      padding: 0 1.5rem; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; color: white;
      font-weight: 600; font-size: .9rem;
    }
    .brand img { width: 26px; height: 26px; background: white; border-radius: 5px; padding: 2px; }
    .nav-links { display: flex; align-items: center; gap: 1.5rem; }
    .nav-links a { font-size: .82rem; color: var(--sub2); text-decoration: none; transition: color .15s; }
    .nav-links a:hover { color: white; }
    .nav-join {
      font-size: .78rem; font-weight: 600;
      background: var(--accent); color: white;
      padding: .4rem 1rem; border-radius: 6px;
      text-decoration: none; transition: opacity .15s;
    }
    .nav-join:hover { opacity: .85; }
    .btn-back {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .8rem; color: var(--sub2);
      background: transparent; border: 1px solid var(--border);
      border-radius: 6px; padding: .38rem .9rem;
      cursor: pointer; font-family: 'Inter', sans-serif;
      text-decoration: none; transition: color .15s, border-color .15s;
    }
    .btn-back:hover { color: white; border-color: var(--border-h); }
    #auth-area { display: flex; align-items: center; }

    /* ── PAGE ── */
    .page {
      max-width: 1160px; margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
    }

    /* ── BREADCRUMB ── */
    .bc {
      display: flex; align-items: center; gap: 6px;
      font-size: .76rem; color: var(--sub);
      margin-bottom: 1.75rem;
    }
    .bc a { color: var(--sub); text-decoration: none; transition: color .15s; }
    .bc a:hover { color: var(--sub2); }
    .bc-sep { color: #374151; }

    /* ── HEADER ── */
    .page-head {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 1.5rem;
      margin-bottom: 2rem; flex-wrap: wrap;
    }
    .head-left { flex: 1; }
    .cat-icon-big {
      width: 40px; height: 40px;
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: .75rem;
      border-radius: 8px;
      background: rgba(59,130,246,.08);
      border: 1px solid rgba(59,130,246,.16);
      color: var(--accent);
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .08em;
    }
    .page-head h1 {
      font-size: 1.65rem; font-weight: 700;
      letter-spacing: -.02em; color: white;
      line-height: 1.2; margin-bottom: .3rem;
    }
    .page-head p { font-size: .85rem; color: var(--sub); line-height: 1.6; }
    .count-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: .35rem .75rem;
      font-size: .78rem; color: var(--sub2);
      white-space: nowrap; align-self: flex-start;
    }
    .count-badge b { color: white; font-weight: 600; }

    /* ── CONTROLS ── */
    .controls {
      display: flex; align-items: center; gap: .75rem;
      margin-bottom: 1.75rem; flex-wrap: wrap;
    }
    .search-wrap {
      position: relative; flex: 1; max-width: 320px;
    }
    .search-wrap svg {
      position: absolute; left: .75rem; top: 50%;
      transform: translateY(-50%); width: 14px; height: 14px;
      color: var(--sub); pointer-events: none;
    }
    .search-wrap input {
      width: 100%; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px;
      padding: .6rem .75rem .6rem 2.2rem;
      font-size: .84rem; color: white;
      font-family: 'Inter', sans-serif;
      outline: none; transition: border-color .2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--sub); }

    /* ── GRID ── */
    #tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: .75rem;
    }

    /* ── TOOL CARD ── */
    .tool-card {
      background: rgba(17,24,39,0.72);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      text-decoration: none; color: inherit;
      display: flex; gap: .9rem; align-items: flex-start;
      transition: background .18s, border-color .18s, transform .18s;
      position: relative; overflow: hidden;
      opacity: 0; transform: translateY(8px);
      animation: up .3s ease forwards;
    }
    @keyframes up { to { opacity:1; transform:translateY(0); } }

    .tool-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0; transition: opacity .25s;
    }
    .tool-card:hover {
      background: var(--surface-h);
      border-color: var(--border-h);
      transform: translateY(-1px);
    }
    .tool-card:hover::before { opacity: 1; }

    /* logo */
    .tool-logo {
      width: 44px; height: 44px; border-radius: 10px;
      background: var(--bg); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .tool-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
    .tool-logo-fb {
      font-size: .9rem; font-weight: 700; color: var(--accent);
      font-family: 'Inter', sans-serif;
    }

    /* body */
    .tool-body { flex: 1; min-width: 0; }
    .tool-name {
      font-size: .9rem; font-weight: 600; color: white;
      margin-bottom: .25rem; line-height: 1.25;
    }
    .tool-desc {
      font-size: .78rem; color: var(--sub);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      /* reveal on hover: clamp expands */
      transition: -webkit-line-clamp .2s;
    }
    .tool-card:hover .tool-desc { -webkit-line-clamp: 4; }

    /* footer row */
    .tool-foot {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-top: .75rem;
      padding-top: .6rem;
      border-top: 1px solid var(--border);
      transition: border-color .2s;
    }
    .tool-card:hover .tool-foot { border-color: var(--border-h); }
    .tool-tag {
      font-size: .68rem; font-weight: 500;
      color: var(--accent);
      background: rgba(59,130,246,.08);
      border: 1px solid rgba(59,130,246,.12);
      padding: 2px 8px; border-radius: 4px;
      max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .tool-cta {
      font-size: .74rem; color: var(--sub);
      display: flex; align-items: center; gap: 3px;
      transition: color .2s, gap .2s;
    }
    .tool-card:hover .tool-cta { color: var(--accent); gap: 6px; }

    /* ── SKELETON ── */
    .skel {
      height: 100px; border-radius: 12px;
      background: var(--surface); border: 1px solid var(--border);
      position: relative; overflow: hidden;
    }
    .skel::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.03) 50%, transparent 100%);
      background-size: 200% 100%; animation: skel 1.4s ease infinite;
    }
    @keyframes skel { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── EMPTY ── */
    .empty {
      grid-column: 1/-1; padding: 4rem; text-align: center;
    }
    .empty p { font-size: .88rem; color: var(--sub); }
    .empty a { color: var(--accent); text-decoration: none; display: inline-block; margin-top: .5rem; font-size: .84rem; }

    /* ── LOADER ── */
    #pg-loader {
      position: fixed; inset: 0; z-index: 200;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
    }
    #pg-loader.gone { display: none; }
    .spin { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ── */
    .foot {
      max-width: 1160px; margin: 0 auto;
      padding: 1.5rem; border-top: 1px solid var(--border);
      display: flex; gap: 1.5rem; flex-wrap: wrap;
      font-size: .76rem; color: var(--sub);
    }
    .foot a { color: var(--sub); text-decoration: none; transition: color .15s; }
    .foot a:hover { color: var(--sub2); }

    @media (max-width: 640px) {
      #tools-grid { grid-template-columns: 1fr; }
      .nav-links a:not(.nav-join):not(.btn-back) { display: none; }
    }
  </style>
</head>

<script>
const SUPABASE_URL = "https://szouczgiuhedynyshpbb.supabase.co";
const SUPABASE_KEY = "sb_publishable_JEvVHrobhuPoU6Z5xkMr2Q_pw8tvzHP";
const CACHE_KEY = "xedge_tools_v2";
const CACHE_TTL = 5 * 60 * 1000;

const META = {
  "AI Chatbot":              {d:"Conversational AI - ask anything, build chatbots, get answers."},
  "Image Generation":        {d:"Turn text into images, illustrations, and stunning artwork."},
  "Productivity":            {d:"Automate repetitive tasks and reclaim hours every week."},
  "Video Editing":           {d:"Edit, trim, subtitle, and enhance video with AI assistance."},
  "Copy Writing":            {d:"Write faster - ads, emails, sales pages, and blog posts."},
  "Video Generation":        {d:"Generate and animate videos from text or images."},
  "Audio and Voice AI":      {d:"Clone voices, transcribe meetings, and generate music."},
  "AI Coding":               {d:"Write, complete, and debug code faster with AI."},
  "Developer Tools":         {d:"APIs, infrastructure, and tools built for developers."},
  "Presentation":            {d:"Build beautiful slides and polished decks in minutes."},
  "Marketing and Ads":       {d:"Create campaigns, copy, and creatives that actually convert."},
  "Health and Fitness":      {d:"AI coaching, wellness planning, and fitness tracking."},
  "Web Designing":           {d:"Design and ship websites without writing a single line of code."},
  "Business and Analytics":  {d:"Turn raw data into clear decisions with AI-powered insights."},
  "Personal Finance and Wealth Management":{d:"Smarter budgeting, investing, and money management."},
  "Scientific Research & Discovery":{d:"Accelerate research, literature review, and analysis."},
  "Sales Assistant and Lead Manager":{d:"Find leads, write outreach, and close more deals."},
  "Cybersecurity & Threat Detection":{d:"Protect your systems and detect threats in real time."},
  "Trading":                 {d:"AI-powered signals, analysis, and automation for traders."},
};

const CATEGORY_ALIASES = {
  bussinessandanalytics: "businessandanalytics",
  businessanalytics: "businessandanalytics",
  aichatbots: "aichatbot",
  chatbot: "aichatbot",
  chatbots: "aichatbot"
};

function normalizeCategory(value) {
  return String(value || "").toLowerCase().replace(/&/g, "and").replace(/[^a-z0-9]+/g, "");
}

function categoryKey(value) {
  const key = normalizeCategory(value);
  return CATEGORY_ALIASES[key] || key;
}

function metaFor(category) {
  const key = categoryKey(category);
  const match = Object.keys(META).find(name => categoryKey(name) === key);
  return match ? META[match] : {};
}

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, ch => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[ch]));
}

function categoryMark(value) {
  const words = String(value || "")
    .replace(/&/g, " and ")
    .split(/[^a-zA-Z0-9]+/)
    .filter(w => w && !["and", "the", "for", "with", "of"].includes(w.toLowerCase()));
  if (!words.length) return "AI";
  if (words[0].toLowerCase() === "ai" && words[1]) return ("AI" + words[1][0]).slice(0, 3).toUpperCase();
  return words.slice(0, 2).map(w => w[0]).join("").toUpperCase();
}

function mapTool(d) {
  return {
    id: d.id || "",
    name: d.name || d.title || "Unknown",
    category: d.category || "",
    logo_url: d.logo_url || "",
    description: d.description || d.long_description || "",
    short_description: d.short_description || d.short || ""
  };
}

function readToolsCache() {
  try {
    const cached = JSON.parse(sessionStorage.getItem(CACHE_KEY) || localStorage.getItem(CACHE_KEY) || "null");
    if (cached && cached.ts && Date.now() - cached.ts < CACHE_TTL && Array.isArray(cached.data)) {
      return cached.data;
    }
  } catch (_) {}
  return null;
}

function readStaleToolsCache() {
  try {
    const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || sessionStorage.getItem(CACHE_KEY) || "null");
    if (cached && Array.isArray(cached.data)) return cached.data;
  } catch (_) {}
  try {
    const old = JSON.parse(localStorage.getItem("tools_cache") || "null");
    if (Array.isArray(old)) return old;
  } catch (_) {}
  return [];
}

function writeToolsCache(tools) {
  const payload = JSON.stringify({ ts: Date.now(), data: tools });
  try { sessionStorage.setItem(CACHE_KEY, payload); } catch (_) {}
  try { localStorage.setItem(CACHE_KEY, payload); } catch (_) {}
}

async function getTools() {
  const forceRefresh = new URLSearchParams(window.location.search).has("refresh");
  if (!forceRefresh) {
    const cached = readToolsCache();
    if (cached && cached.length) return cached;
    const stale = readStaleToolsCache();
    if (stale && stale.length) {
      fetch(
        `${SUPABASE_URL}/rest/v1/xedge?select=id,name,category,logo_url,short_description,link,goal&order=name.asc&limit=1000`,
        { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
      )
        .then(res => res.ok ? res.json() : [])
        .then(rows => { if (Array.isArray(rows) && rows.length) writeToolsCache(rows.map(mapTool)); })
        .catch(() => {});
      return stale;
    }
  } else {
    try { sessionStorage.removeItem(CACHE_KEY); } catch (_) {}
    try { localStorage.removeItem(CACHE_KEY); } catch (_) {}
    try { localStorage.removeItem("tools_cache"); } catch (_) {}
  }

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/xedge?select=id,name,category,logo_url,short_description,link,goal&order=name.asc&limit=1000`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) throw new Error(`Supabase ${res.status}`);
    const rows = await res.json();
    const tools = Array.isArray(rows) ? rows.map(mapTool) : [];
    writeToolsCache(tools);
    return tools;
  } catch (_) {
    return readStaleToolsCache();
  }
}

document.addEventListener("DOMContentLoaded", async () => {
  const params = new URLSearchParams(window.location.search);
  const cat    = params.get("cat")?.trim();

  const titleEl = document.getElementById("cat-title");
  const descEl  = document.getElementById("cat-desc");
  const iconEl  = document.getElementById("cat-icon");
  const countEl = document.getElementById("tool-count");
  const bcEl    = document.getElementById("bc-cat");
  const grid    = document.getElementById("tools-grid");

  if (!cat) {
    titleEl.textContent = "Category not found";
    grid.innerHTML = `<div class="empty"><p>No category selected.</p><a href="Categories.html">Browse categories</a></div>`;
    document.getElementById("pg-loader").classList.add("gone");
    return;
  }

  const m = metaFor(cat);
  titleEl.textContent = cat;
  bcEl.textContent    = cat;
  document.title      = `${cat} - XEdge`;
  iconEl.textContent = categoryMark(cat);
  if (m.d) descEl.textContent = m.d;

  try {
    const tools = await getTools();
    const key   = categoryKey(cat);
    const matchedCategory = tools.find(t => categoryKey(t.category) === key)?.category?.trim();
    const displayCat = matchedCategory || (key === "businessandanalytics" ? "Business and Analytics" : cat);
    const finalMeta = metaFor(displayCat);

    titleEl.textContent = displayCat;
    bcEl.textContent    = displayCat;
    document.title      = `${displayCat} - XEdge`;
    iconEl.textContent = categoryMark(displayCat);
    if (finalMeta.d) descEl.textContent = finalMeta.d;

    const all = tools
      .filter(t => categoryKey(t.category) === key)
      .map(t => ({name:t.name||"Unknown", desc:t.description||t.short_description||"", logo:t.logo_url||"", category:t.category||displayCat}));

    countEl.textContent = all.length;

    function render(list) {
      if (!list.length) {
        grid.innerHTML = `<div class="empty"><p>No tools found.</p><a href="Categories.html">Back to categories</a></div>`;
        return;
      }
      grid.innerHTML = list.map((t,i) => {
        const safeName = escapeHtml(t.name);
        const safeDesc = escapeHtml(t.desc.slice(0,200));
        const safeLogo = escapeHtml(t.logo);
        const safeCat = escapeHtml(t.category || displayCat);
        const init  = escapeHtml((t.name[0]||"X").toUpperCase());
        const logo  = t.logo
          ? `<img src="${safeLogo}" alt="${safeName}" onerror="this.parentElement.innerHTML='<span class=tool-logo-fb>${init}</span>'">`
          : `<span class="tool-logo-fb">${init}</span>`;
        return `
        <a href="tool.html?tool=${encodeURIComponent(t.name)}" class="tool-card"
           style="animation-delay:${i*25}ms">
          <div class="tool-logo">${logo}</div>
          <div class="tool-body">
            <div class="tool-name">${safeName}</div>
            <div class="tool-desc">${safeDesc}</div>
            <div class="tool-foot">
              <span class="tool-tag">${safeCat}</span>
              <span class="tool-cta">View details <span>&rarr;</span></span>
            </div>
          </div>
        </a>`;
      }).join("");
    }

    render(all);

    document.getElementById("tool-q").addEventListener("input", e => {
      const v = e.target.value.toLowerCase().trim();
      const f = v ? all.filter(t => t.name.toLowerCase().includes(v) || t.desc.toLowerCase().includes(v)) : all;
      countEl.textContent = f.length;
      render(f);
    });

  } catch(e) {
    grid.innerHTML = `<div class="empty"><p>Couldn't load tools.</p><a href="Categories.html">Go back</a></div>`;
  }

  document.getElementById("pg-loader").classList.add("gone");

  // back button
  document.getElementById("backBtn").addEventListener("click", () => {
    const ref = document.referrer;
    if (!ref || !ref.includes(window.location.hostname)) window.location.href = "Categories.html";
    else history.back();
  });
});
</script>

function signInWithGoogle(){ auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(()=>alert("Login failed")); }
function logoutUser(){ auth.signOut(); }
auth.onAuthStateChanged(u => {
  const a = document.getElementById("auth-area");
  if (!u) {
    a.innerHTML = `<button onclick="signInWithGoogle()" style="font-size:.78rem;font-weight:500;color:#9ca3af;background:transparent;border:1px solid #1f2937;padding:5px 14px;border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif;" onmouseover="this.style.borderColor='#374151'" onmouseout="this.style.borderColor='#1f2937'">Sign in</button>`;
    return;
  }
  a.innerHTML = `<div style="position:relative;"><img src="${u.photoURL}" style="width:30px;height:30px;border-radius:50%;border:1.5px solid #1f2937;cursor:pointer;" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='block'?'none':'block'"/><div style="display:none;position:absolute;right:0;top:38px;background:#111827;border:1px solid #1f2937;border-radius:10px;padding:12px;min-width:160px;z-index:99;"><p style="font-size:.82rem;font-weight:500;color:white;margin-bottom:1px;">${u.displayName}</p><p style="font-size:.72rem;color:#6b7280;margin-bottom:10px;">${u.email}</p><button onclick="logoutUser()" style="width:100%;background:rgba(239,68,68,.08);color:#f87171;border:1px solid rgba(239,68,68,.12);padding:6px;border-radius:6px;cursor:pointer;font-size:.78rem;font-family:'Inter',sans-serif;">Sign out</button></div></div>`;
});
document.addEventListener("click", e => { document.querySelectorAll('[style*="display:block"]').forEach(el => { if (!el.previousElementSibling?.contains(e.target)) el.style.display="none"; }); });
</script>
</body>
</html>
