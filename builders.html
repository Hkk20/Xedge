<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Builder Stories | XEdge</title>
  <meta name="description" content="How builders use AI tools to make real work move faster." />
  <link rel="icon" href="xedge-logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="analytics.js" defer></script>
  <script src="builders.js" defer></script>
  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #0b0f15; color: #f8fafc; font-family: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif; }
    .xe-nav { position: sticky; top: 0; z-index: 5; height: 68px; display: flex; align-items: center; background: rgba(11,15,21,.9); backdrop-filter: blur(18px); border-bottom: 1px solid rgba(255,255,255,.07); }
    .xe-nav-inner { width: min(1400px, 100%); padding: 0 24px; margin: auto; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .xe-logo { display: inline-flex; align-items: center; gap: 10px; color: #fff; text-decoration: none; font-size: .95rem; font-weight: 700; letter-spacing: .08em; }
    .xe-logo img { width: 34px; height: 34px; }
    .xe-nav-links { display: flex; align-items: center; gap: 22px; }
    .xe-nav-links a { color: #9ca3af; text-decoration: none; font-size: .86rem; font-weight: 600; transition: color .15s; }
    .xe-nav-links a:hover, .xe-nav-links a[aria-current="page"] { color: #60a5fa; }
    .nav-cta { color: #dbeafe; text-decoration: none; border: 1px solid rgba(59,130,246,.35); background: rgba(59,130,246,.1); padding: 8px 14px; border-radius: 999px; font-size: .82rem; font-weight: 700; }
    main { width: min(1040px, calc(100% - 48px)); margin: 0 auto; padding: 86px 0 100px; }
    .eyebrow, .builder-detail-label { color: #60a5fa; font-size: .74rem; font-weight: 700; letter-spacing: .13em; text-transform: uppercase; }
    .hero { max-width: 710px; margin-bottom: 54px; }
    h1 { margin: 12px 0 16px; max-width: 670px; font-size: clamp(2.4rem, 6vw, 4.8rem); letter-spacing: -.065em; line-height: .98; }
    .hero p { margin: 0; color: #9ca3af; font-size: 1.05rem; line-height: 1.7; }
    #builder-gallery { display: grid; gap: 20px; }
    .builder-story-card { position: relative; padding: clamp(24px, 4vw, 40px); border: 1px solid rgba(255,255,255,.09); border-radius: 22px; background: linear-gradient(135deg, rgba(29,78,216,.12), rgba(17,24,39,.68) 40%, rgba(17,24,39,.78)); scroll-margin-top: 92px; }
    .builder-story-card.is-selected { border-color: rgba(96,165,250,.75); box-shadow: 0 0 0 4px rgba(59,130,246,.12), 0 24px 65px rgba(0,0,0,.2); }
    .builder-story-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
    .builder-profile { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .builder-avatar { flex: 0 0 auto; display: grid; place-items: center; width: 44px; height: 44px; overflow: hidden; border: 2px solid rgba(255,255,255,.14); border-radius: 50%; color: #fff; font-size: .8rem; font-weight: 700; letter-spacing: .04em; box-shadow: 0 8px 20px rgba(0,0,0,.22); }
    .builder-avatar img { display: block; width: 100%; height: 100%; object-fit: cover; }
    .builder-profile-large .builder-avatar { width: 54px; height: 54px; font-size: .88rem; }
    .builder-byline { display: grid; gap: 3px; }
    .builder-byline strong { color: #f8fafc; font-size: .98rem; }
    .builder-byline span { color: #8b93b0; font-size: .82rem; }
    .builder-card-kicker { flex: 0 0 auto; color: #93c5fd; background: rgba(59,130,246,.13); border: 1px solid rgba(96,165,250,.24); border-radius: 999px; padding: 6px 10px; font-size: .7rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
    blockquote { max-width: 860px; margin: 32px 0 0; color: #fff; font-size: clamp(1.4rem, 3vw, 2.05rem); line-height: 1.38; letter-spacing: -.035em; }
    .builder-story-detail > p { margin: 24px 0 0; max-width: 780px; color: #aeb7c8; line-height: 1.72; font-size: .96rem; }
    .builder-story-detail { margin-top: 0; }
    .builder-detail-label { margin-bottom: 10px; }
    .builder-recommendation { display: grid; grid-template-columns: 180px minmax(0, 1fr); gap: 20px; margin-top: 30px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,.1); }
    .builder-recommendation-heading { display: grid; align-content: start; gap: 4px; color: #8b93b0; font-size: .74rem; line-height: 1.25; text-transform: uppercase; letter-spacing: .08em; }
    .builder-recommendation-heading strong { color: #dbeafe; font-size: .82rem; letter-spacing: .01em; }
    .builder-tool-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
    .builder-tool-card { min-width: 0; display: flex; align-items: center; gap: 10px; padding: 10px; background: rgba(59,130,246,.08); border: 1px solid rgba(96,165,250,.2); border-radius: 12px; color: #dbeafe; text-decoration: none; font-size: .8rem; font-weight: 700; transition: transform .15s, background .15s, border-color .15s; }
    .builder-tool-card:hover { transform: translateY(-2px); background: rgba(59,130,246,.16); border-color: rgba(96,165,250,.46); }
    .builder-tool-card img { width: 40px; height: 40px; flex: 0 0 auto; object-fit: contain; border-radius: 9px; background: #111827; }
    .builder-tool-card > span:not(.builder-tool-arrow) { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .builder-tool-arrow { margin-left: auto; color: #93c5fd; font-size: .9rem; }
    .builder-takeaway { margin-top: 20px !important; padding: 14px 16px; border-left: 3px solid #3b82f6; background: rgba(59,130,246,.07); border-radius: 0 10px 10px 0; color: #dbeafe !important; }
    .builder-takeaway strong { color: #fff; }
    .footer-link { display: inline-flex; margin-top: 48px; color: #93c5fd; text-decoration: none; font-size: .9rem; font-weight: 700; }
    @media (max-width: 680px) { .xe-nav-links { display: none; } .xe-nav-inner { padding: 0 18px; } main { width: min(100% - 32px, 1040px); padding-top: 58px; } .builder-story-head { align-items: center; } .builder-card-kicker { font-size: .62rem; padding: 5px 8px; } .builder-recommendation { grid-template-columns: 1fr; } .builder-tool-grid { grid-template-columns: 1fr; } }
  </style>
</head>

  <header class="xe-nav">
    <nav class="xe-nav-inner" aria-label="Main navigation">
      <a class="xe-logo" href="index.html"><img src="xedge-logo.png" alt="XEdge logo" /> <span>XEDGE</span></a>
      <div class="xe-nav-links">
        <a href="index.html">Home</a>
        <a href="Explore.html">Explore Tools</a>
        <a href="stack.html">Stacks</a>
        <a href="builders.html" aria-current="page">Builder Stories</a>
      </div>
      <a class="nav-cta" href="Join.html">Join Beta</a>
    </nav>
  </header>
  <main>
    <section class="hero" aria-labelledby="page-title">
      <div class="eyebrow">The builder library</div>
      <h1 id="page-title">Here’s what people think about tools.</h1>
      <p>Short, practical notes from people doing the work: what earned a place in their stack, what did not, and the habits that make AI genuinely useful.</p>
    </section>
    <section id="builder-gallery" aria-label="Builder stories"></section>
    <a class="footer-link" href="index.html">&larr; Back to XEdge home</a>
  </main>
</body>
</html>
