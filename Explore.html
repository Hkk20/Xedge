  <!-- Explore data is loaded inline; Firebase auth is lazy-loaded after idle. -->
  <script>
  (function() {
    "use strict";

    const SUPABASE_URL = "https://szouczgiuhedynyshpbb.supabase.co";
    const SUPABASE_KEY = "sb_publishable_JEvVHrobhuPoU6Z5xkMr2Q_pw8tvzHP";
    const CACHE_KEY = "xedge_tools_v2";
    const CACHE_TTL = 5 * 60 * 1000;
    const BATCH_SIZE = 12;

    let allTools = [];
    let filteredTools = [];
    let renderIndex = 0;
    let observer = null;

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[ch]));
    }

    function getCachedTools() {
      try {
        const cached = JSON.parse(sessionStorage.getItem(CACHE_KEY) || localStorage.getItem(CACHE_KEY) || "null");
        if (cached && cached.ts && Date.now() - cached.ts < CACHE_TTL && Array.isArray(cached.data)) {
          return cached.data;
        }
      } catch (_) {}
      return null;
    }

    function getAnyCachedTools() {
      try {
        const cached = JSON.parse(sessionStorage.getItem(CACHE_KEY) || localStorage.getItem(CACHE_KEY) || "null");
        if (cached && Array.isArray(cached.data) && cached.data.length) return cached.data;
      } catch (_) {}
      return null;
    }

    function setCachedTools(data) {
      const payload = JSON.stringify({ ts: Date.now(), data });
      try { sessionStorage.setItem(CACHE_KEY, payload); } catch (_) {}
      try { localStorage.setItem(CACHE_KEY, payload); } catch (_) {}
    }

    async function fetchFreshTools() {
      const res = await fetch(
        SUPABASE_URL + "/rest/v1/xedge?select=id,name,category,logo_url,short_description,link,goal&order=name.asc&limit=1000",
        { headers: { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY } }
      );
      if (!res.ok) throw new Error("Supabase " + res.status);

      const rows = await res.json();
      const tools = Array.isArray(rows) ? rows.map(d => ({
        id: d.id || "",
        name: d.name || d.title || "Unknown",
        category: d.category || "",
        logo_url: d.logo_url || "",
        short_description: d.short_description || d.short || ""
      })) : [];
      setCachedTools(tools);
      return tools;
    }

    async function fetchTools() {
      const cached = getCachedTools() || getAnyCachedTools();
      if (cached && cached.length) {
        fetchFreshTools().catch(() => {});
        return cached;
      }
      return fetchFreshTools();
    }

    function createCard(tool) {
      const name = tool.name || "";
      const safeName = escapeHtml(name);
      const safeCategory = escapeHtml(tool.category || "");
      const logo = tool.logo_url || "https://dummyimage.com/56x56/1e293b/ffffff&text=" + encodeURIComponent(name.slice(0, 2) || "?");

      return `
        <a href="tool.html?tool=${encodeURIComponent(name)}" class="xe-tool-card" role="listitem" aria-label="${safeName}">
          <img src="${escapeHtml(logo)}" alt="${safeName} logo" width="56" height="56" loading="lazy" decoding="async" onerror="this.src='xedge-logo.png'"/>
          <h2>${safeName}</h2>
          <p class="cat">${safeCategory}</p>
        </a>`;
    }

    function updateCount() {
      const countEl = document.getElementById("result-count");
      if (!countEl || !allTools.length) return;
      const showing = Math.min(renderIndex, filteredTools.length);
      countEl.textContent = filteredTools.length === allTools.length
        ? `Showing ${showing} of ${allTools.length} tools`
        : `${filteredTools.length} result${filteredTools.length !== 1 ? "s" : ""} - showing ${showing}`;
    }

    function loadMore() {
      const container = document.getElementById("toolsContainer");
      if (!container || renderIndex >= filteredTools.length) return;
      container.insertAdjacentHTML(
        "beforeend",
        filteredTools.slice(renderIndex, renderIndex + BATCH_SIZE).map(createCard).join("")
      );
      renderIndex += BATCH_SIZE;
      updateCount();
    }

    function setupInfiniteScroll() {
      const sentinel = document.getElementById("load-more-sentinel");
      if (!sentinel || !("IntersectionObserver" in window)) return;
      if (observer) observer.disconnect();
      observer = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting) loadMore();
      }, { rootMargin: "400px" });
      observer.observe(sentinel);
    }

    function renderEmpty(query) {
      const container = document.getElementById("toolsContainer");
      if (!container) return;
      container.innerHTML = `
        <div class="xe-empty" role="status">
          <h3>No results for "${escapeHtml(query)}"</h3>
          <p>Try a different keyword.</p>
        </div>`;
      const countEl = document.getElementById("result-count");
      if (countEl) countEl.textContent = "0 results";
    }

    function applySearch(query) {
      const q = query.toLowerCase().trim();
      const container = document.getElementById("toolsContainer");
      if (!container) return;

      filteredTools = q
        ? allTools.filter(t => (t.name || "").toLowerCase().includes(q) || (t.category || "").toLowerCase().includes(q))
        : allTools;

      container.textContent = "";
      renderIndex = 0;
      if (!filteredTools.length) {
        renderEmpty(q);
        return;
      }
      loadMore();
    }

    function renderTools(tools) {
      const container = document.getElementById("toolsContainer");
      if (!container) return;
      allTools = tools;
      filteredTools = tools;
      container.textContent = "";
      renderIndex = 0;
      if (filteredTools.length) {
        loadMore();
        setupInfiniteScroll();
      } else {
        renderEmpty("tools");
      }
    }

    async function initExplore() {
      const container = document.getElementById("toolsContainer");
      const searchInput = document.getElementById("toolSearch");
      if (!container) return;

      container.innerHTML = Array.from({ length: 12 }, () => `<div class="xe-skel" aria-hidden="true"></div>`).join("");

      const cached = getAnyCachedTools();
      if (cached && cached.length) renderTools(cached);

      let searchTimer = null;
      searchInput && searchInput.addEventListener("input", () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => applySearch(searchInput.value), 150);
      });

      try {
        const tools = await fetchTools();
        if (!cached || tools.length !== cached.length) renderTools(tools);
      } catch (_) {
        if (!cached || !cached.length) renderEmpty("tools");
      }
    }

    document.addEventListener("DOMContentLoaded", initExplore);
  })();
  </script>

  <script>
  (function() {
    "use strict";

    /* ── CROSS-PAGE CACHE BRIDGE ──────────────────────────────────────────
       index.html stores tools in localStorage "xedge_tools_cache_v2".
       tools.js reads from sessionStorage "xedge_tools_v1".
       This bridge primes sessionStorage from localStorage so Explore never
       hits Google Sheets cold if index already fetched the data.
    ─────────────────────────────────────────────────────────────────────── */
    /* ── MOBILE MENU ─────────────────────────────────────────────────────── */
    function initMobileMenu() {
      const toggle = document.getElementById("mobile-menu-toggle");
      const menu   = document.getElementById("mobileMenu");
      const bd     = document.getElementById("nav-backdrop");
      if (!toggle || !menu) return;
      let open = false;
      const openFn  = () => { open=true;  menu.classList.add("open");    bd&&bd.classList.add("show");    toggle.classList.add("open");    toggle.setAttribute("aria-expanded","true");  document.body.style.overflow="hidden"; };
      const closeFn = () => { open=false; menu.classList.remove("open"); bd&&bd.classList.remove("show"); toggle.classList.remove("open"); toggle.setAttribute("aria-expanded","false"); document.body.style.overflow=""; };
      toggle.addEventListener("click", () => open ? closeFn() : openFn());
      bd && bd.addEventListener("click", closeFn);
      menu.querySelectorAll("a").forEach(a => a.addEventListener("click", closeFn));
      document.addEventListener("keydown", e => { if (e.key==="Escape"&&open) closeFn(); });
    }

    /* ── FIREBASE AUTH ───────────────────────────────────────────────────── */
    function initFirebase() {
      if (typeof firebase === "undefined") return;
      if (!firebase.apps.length) {
        firebase.initializeApp({
          apiKey:"AIzaSyC-uRePD86sTpCRgjPsjhpOp-lzTNNF8Zg",
          authDomain:"xedge-1da3a.firebaseapp.com",
          projectId:"xedge-1da3a",
          storageBucket:"xedge-1da3a.appspot.com",
          messagingSenderId:"209657807080",
          appId:"1:209657807080:web:80180596d966b4667d895d"
        });
      }
      const auth = firebase.auth();
      const prov = new firebase.auth.GoogleAuthProvider();
      window.signInWithGoogle = () => auth.signInWithPopup(prov).catch(console.error);
      window.logoutUser = () => auth.signOut();
      auth.onAuthStateChanged(user => {
        const nav = document.getElementById("auth-area");
        if (!nav) return;
        if (user) {
          nav.innerHTML = `<div style="position:relative;">
            <img id="profileBtn" src="${user.photoURL}" alt="Profile" onerror="this.src='xedge-logo.png'"
              style="width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,.1);cursor:pointer;display:block;"/>
            <div id="profileMenu" style="display:none;position:absolute;right:0;top:calc(100%+8px);min-width:180px;background:#111827;border:1px solid rgba(255,255,255,.1);border-radius:14px;overflow:hidden;box-shadow:0 20px 40px rgba(0,0,0,.5);z-index:100;">
              <div style="padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);">
                <div style="font-weight:700;font-size:.9rem;">${user.displayName}</div>
                <div style="font-size:.78rem;color:#6b7280;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${user.email}</div>
              </div>
              <button onclick="logoutUser()" style="width:100%;text-align:left;padding:12px 16px;background:none;border:none;color:#f87171;cursor:pointer;font-size:.9rem;font-family:inherit;">Sign out</button>
            </div></div>`;
          setTimeout(() => {
            const btn = document.getElementById("profileBtn");
            const pm  = document.getElementById("profileMenu");
            if (!btn||!pm) return;
            btn.onclick = e => { e.stopPropagation(); pm.style.display = pm.style.display==="none"?"block":"none"; };
            document.addEventListener("click", e => { if (!pm.contains(e.target)&&e.target!==btn) pm.style.display="none"; });
          }, 0);
        } else {
          nav.innerHTML = `<button onclick="signInWithGoogle()" style="border:1px solid rgba(59,130,246,.4);padding:7px 18px;border-radius:100px;background:none;color:#60a5fa;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:600;">Sign In</button>`;
        }
      });
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = src;
        script.async = true;
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }

    function initAuthWhenIdle() {
      const run = async () => {
        try {
          await loadScript("https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js");
          await loadScript("https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js");
          initFirebase();
        } catch (_) {}
      };

      if ("requestIdleCallback" in window) {
        requestIdleCallback(run, { timeout: 3000 });
      } else {
        setTimeout(run, 1500);
      }
    }

    /* ── BOOT ────────────────────────────────────────────────────────────── */
    function boot() {
      initMobileMenu();
      initAuthWhenIdle();
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", boot);
    } else {
      boot();
    }

  })();
  </script>

</body>
</html>
