  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; overflow-x: hidden; }
    body {
      font-family: 'Space Grotesk', ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: #0b0f15; color: #fff; -webkit-font-smoothing: antialiased;
    }

    /* ─── NAV ─── */
    .xe-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 60; height: 68px;
      background: rgba(11,15,21,0.92); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,0.07); display: flex; align-items: center;
    }
    .xe-nav-inner {
      max-width: 1400px; width: 100%; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .xe-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
    .xe-logo img { width: 36px; height: 36px; border-radius: 8px; }
    .xe-logo span { font-size: 1.25rem; font-weight: 700; color: #60a5fa; letter-spacing: -0.3px; }
    .xe-nav-links { display: flex; align-items: center; gap: 4px; }
    .xe-nav-links a { font-size: 0.9rem; font-weight: 500; color: #9ca3af; padding: 6px 14px; border-radius: 8px; text-decoration: none; transition: color .15s, background .15s; }
    .xe-nav-links a:hover { color: #fff; background: rgba(255,255,255,0.06); }
    .xe-nav-links a.active { color: #60a5fa; background: rgba(59,130,246,0.08); }
    .xe-nav-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .xe-btn-beta { background: linear-gradient(135deg, #3b82f6, #6366f1); padding: 8px 20px; border-radius: 100px; font-size: 0.85rem; font-weight: 600; color: #fff; text-decoration: none; transition: opacity .15s, transform .15s; white-space: nowrap; }
    .xe-btn-beta:hover { opacity: 0.88; transform: translateY(-1px); }
    .xe-hamburger { display: none; background: none; border: none; cursor: pointer; padding: 8px; color: #d1d5db; flex-direction: column; gap: 5px; align-items: center; justify-content: center; }
    .xe-hamburger span { display: block; width: 22px; height: 2px; background: currentColor; border-radius: 2px; transition: transform .25s, opacity .25s; }
    .xe-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .xe-hamburger.open span:nth-child(2) { opacity: 0; }
    .xe-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .xe-mobile-menu { position: fixed; top: 68px; left: 0; right: 0; z-index: 59; background: rgba(11,15,21,0.98); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.07); padding: 12px 16px 20px; display: none; flex-direction: column; gap: 4px; }
    .xe-mobile-menu.open { display: flex; }
    .xe-mobile-menu a { padding: 12px 16px; border-radius: 10px; font-size: 1rem; font-weight: 500; color: #9ca3af; text-decoration: none; transition: color .15s, background .15s; }
    .xe-mobile-menu a:hover { color: #fff; background: rgba(255,255,255,0.06); }
    .xe-mobile-menu .xe-mobile-cta { background: linear-gradient(135deg, #3b82f6, #6366f1); color: #fff !important; text-align: center; margin-top: 8px; font-weight: 600; }
    .nav-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 58; opacity: 0; pointer-events: none; transition: opacity .2s; }
    .nav-backdrop.show { opacity: 1; pointer-events: auto; }

    /* ─── PAGE ─── */
    main { padding-top: 68px; }
    .xe-page { max-width: 1400px; margin: 0 auto; padding: 48px 24px 96px; }
    .explore-header { margin-bottom: 32px; }
    .xe-section-label { font-size: 0.75rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #3b82f6; margin-bottom: 10px; }
    .explore-header h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; letter-spacing: -1px; margin: 0 0 8px; }
    .explore-header p { font-size: 0.95rem; color: #8b93b0; margin: 0; }

    /* ─── SEARCH ─── */
    .xe-search-wrap { position: relative; max-width: 560px; margin-bottom: 16px; }
    .xe-search-wrap svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: #6b7a9a; pointer-events: none; }
    #toolSearch { width: 100%; background: rgba(17,24,39,0.9); border: 1px solid rgba(255,255,255,0.09); border-radius: 100px; padding: 13px 20px 13px 44px; color: #fff; font-family: inherit; font-size: 0.95rem; outline: none; transition: border-color .15s, box-shadow .15s; }
    #toolSearch:focus { border-color: rgba(59,130,246,0.5); box-shadow: 0 0 0 3px rgba(59,130,246,0.08); }
    #toolSearch::placeholder { color: #4b5a72; }

    /* ─── COUNT ─── */
    #result-count { font-size: 0.82rem; color: #6b7a9a; margin: 0 0 20px; min-height: 20px; }

    /* ─── GRID ─── */
    #toolsContainer { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }

    /* ─── CARD ─── */
    .xe-tool-card { display: block; background: rgba(13,18,28,0.85); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; text-decoration: none; color: #fff; transition: border-color .2s, transform .2s, box-shadow .2s; }
    .xe-tool-card:hover { border-color: rgba(59,130,246,0.35); transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.3); }
    .xe-tool-card img { width: 56px; height: 56px; border-radius: 12px; object-fit: contain; background: #1f2937; margin-bottom: 14px; display: block; }
    .xe-tool-card h2 { font-size: 1rem; font-weight: 700; margin: 0 0 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .xe-tool-card .cat { font-size: 0.8rem; color: #8b93b0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0; }

    /* ─── SKELETON ─── */
    .xe-skel { height: 130px; border-radius: 16px; background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.055) 50%, rgba(255,255,255,0.03) 75%); background-size: 200% 100%; animation: shimmer 1.4s ease infinite; }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ─── SENTINEL / LOADER ─── */
    #load-more-sentinel { height: 40px; }
    #explore-loader { text-align: center; color: #6b7a9a; padding: 24px; font-size: 0.88rem; display: none; }

    /* ─── EMPTY STATE ─── */
    .xe-empty { grid-column: 1/-1; text-align: center; padding: 64px 24px; color: #6b7a9a; }
    .xe-empty svg { width: 40px; height: 40px; margin: 0 auto 14px; display: block; opacity: 0.35; }
    .xe-empty h3 { font-size: 1rem; font-weight: 700; color: #9ca3af; margin-bottom: 6px; }
    .xe-empty p { font-size: 0.85rem; margin: 0; }

    /* ─── ACCESSIBILITY ─── */
    .xe-sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    a:focus-visible, button:focus-visible, input:focus-visible { outline: 2px solid #3b82f6; outline-offset: 3px; border-radius: 4px; }
    a:focus:not(:focus-visible), button:focus:not(:focus-visible) { outline: none; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 767px) {
      .xe-nav-links, .xe-btn-beta { display: none !important; }
      .xe-hamburger { display: flex !important; }
      .xe-page { padding: 32px 16px 80px; }
      #toolsContainer { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>

  <main id="main-content">

  <!-- Firebase: deferred — never blocks paint -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js" defer></script>

  <!-- tools.js + app.js: unchanged, just deferred -->
  <script src="tools.js" defer></script>
  <script src="app.js" defer></script>

  <script>
  (function() {
    "use strict";

    /* ─── CROSS-PAGE CACHE BRIDGE ─────────────────────────────────────────
       index.html caches tools in localStorage "xedge_tools_cache_v2".
       tools.js reads sessionStorage "xedge_tools_v1".
       Without this bridge every Explore load hits Google Sheets cold even
       if the user just visited index. This maps between formats and primes
       the sessionStorage cache before getTools() is called.
    ──────────────────────────────────────────────────────────────────────── */
    function primeSessionCache() {
      try {
        if (sessionStorage.getItem("xedge_tools_v1")) return; // already primed
        const raw = localStorage.getItem("xedge_tools_cache_v2");
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.data) || !parsed.data.length) return;
        const mapped = parsed.data.map(d => ({
          name:             d.name || "",
          category:         d.category || "",
          short_description:d.short || d.short_description || "",
          long_description: d.long_description || "",
          logo_url:         d.logo_url || d.logo || "",
          link:             d.link || d.Link || "#",
          pros_raw:         d.pros || "",
          cons_raw:         d.cons || "",
          key_features_raw: d.key_features || "",
          best_for_raw:     d.best_for || "",
          standout_raw:     d.standout || "",
          screenshots_raw:  d.screenshots || "",
          pricing_free:     d.pricing_free || "",
          pricing_plus:     d.pricing_plus || "",
          pricing_team:     d.pricing_team || ""
        }));
        sessionStorage.setItem("xedge_tools_v1", JSON.stringify(mapped));
      } catch(e) { /* non-critical */ }
    }

    /* ─── CARD BUILDER ────────────────────────────────────────────────────
       Same data + href as app.js createCard.
       Adds: alt text, explicit width/height (prevents CLS), role="listitem",
       onerror fallback so broken logos don't leave empty boxes.
    ──────────────────────────────────────────────────────────────────────── */
    function buildCard(tool) {
      const name = tool.name || "";
      const logo = tool.logo_url ||
        "https://dummyimage.com/56x56/1e293b/fff&text=" +
        encodeURIComponent(name.slice(0, 2) || "?");
      const safe = name.replace(/"/g,"&quot;").replace(/'/g,"&#39;");
      const dataAttr = JSON.stringify(tool).replace(/"/g,"&quot;");
      return `<a href="tool.html?tool=${encodeURIComponent(name)}"
                 class="xe-tool-card" role="listitem" aria-label="${safe}"
                 onclick="if(window.storeSelectedTool)storeSelectedTool(${dataAttr})">
               <img src="${logo}" alt="${safe} logo"
                    width="56" height="56" loading="lazy"
                    onerror="this.src='https://dummyimage.com/56x56/1e293b/fff&text=${encodeURIComponent(name.slice(0,2)||'?')}'"/>
               <h2>${name}</h2>
               <p class="cat">${tool.category || ""}</p>
             </a>`;
    }

    /* ─── STATE ─── */
    let ALL = [], FILTERED = [], IDX = 0;
    const BATCH = 12;

    /* ─── RENDER BATCH (DocumentFragment = single reflow) ─── */
    function renderBatch() {
      if (IDX >= FILTERED.length) return;
      const container = document.getElementById("toolsContainer");
      if (!container) return;
      const frag = document.createDocumentFragment();
      FILTERED.slice(IDX, IDX + BATCH).forEach(t => {
        const div = document.createElement("div");
        div.innerHTML = buildCard(t);
        frag.appendChild(div.firstElementChild);
      });
      container.appendChild(frag);
      IDX += BATCH;
      updateCount();
    }

    /* ─── COUNT ─── */
    function updateCount() {
      const el = document.getElementById("result-count");
      if (!el || !ALL.length) return;
      const showing = Math.min(IDX, FILTERED.length);
      el.textContent = FILTERED.length === ALL.length
        ? `Showing ${showing} of ${ALL.length} tools`
        : `${FILTERED.length} result${FILTERED.length !== 1 ? "s" : ""} — showing ${showing}`;
    }

    /* ─── INFINITE SCROLL: IntersectionObserver replaces scroll event ────
       The original app.js uses a window "scroll" listener that fires
       hundreds of times per scroll event — constant main-thread pressure.
       IntersectionObserver fires only once when the sentinel enters the
       viewport — zero overhead during scrolling.
    ──────────────────────────────────────────────────────────────────────── */
    let observer = null;
    function setupObserver() {
      const sentinel = document.getElementById("load-more-sentinel");
      if (!sentinel) return;
      if (observer) observer.disconnect();
      observer = new IntersectionObserver(
        entries => { if (entries[0].isIntersecting) renderBatch(); },
        { rootMargin: "400px" }
      );
      observer.observe(sentinel);
    }

    /* ─── SEARCH ─── */
    let searchTimer = null;
    function applySearch(q) {
      const term = q.toLowerCase().trim();
      const container = document.getElementById("toolsContainer");
      if (!container) return;
      FILTERED = term
        ? ALL.filter(t =>
            (t.name||"").toLowerCase().includes(term) ||
            (t.category||"").toLowerCase().includes(term))
        : ALL;
      container.innerHTML = "";
      IDX = 0;
      if (!FILTERED.length) {
        container.innerHTML = `
          <div class="xe-empty" role="status">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <h3>No results for "${q.replace(/"/g,"&quot;")}"</h3>
            <p>Try a different keyword or browse by <a href="Categories.html"
               style="color:#60a5fa;">category</a>.</p>
          </div>`;
        const el = document.getElementById("result-count");
        if (el) el.textContent = "0 results";
        return;
      }
      renderBatch();
    }

    /* ─── SKELETONS ─── */
    function showSkeletons() {
      const c = document.getElementById("toolsContainer");
      if (!c) return;
      let h = "";
      for (let i = 0; i < 12; i++) h += `<div class="xe-skel" aria-hidden="true"></div>`;
      c.innerHTML = h;
    }

    /* ─── MOBILE MENU ─── */
    function initMobileMenu() {
      const toggle = document.getElementById("mobile-menu-toggle");
      const menu   = document.getElementById("mobileMenu");
      const bd     = document.getElementById("nav-backdrop");
      if (!toggle || !menu) return;
      let open = false;
      const openFn  = () => { open=true;  menu.classList.add("open");    bd&&bd.classList.add("show");    toggle.classList.add("open");    toggle.setAttribute("aria-expanded","true");  document.body.style.overflow="hidden"; };
      const closeFn = () => { open=false; menu.classList.remove("open"); bd&&bd.classList.remove("show"); toggle.classList.remove("open"); toggle.setAttribute("aria-expanded","false"); document.body.style.overflow=""; };
      toggle.addEventListener("click", () => open ? closeFn() : openFn());
      bd && bd.addEventListener("click", closeFn);
      menu.querySelectorAll("a").forEach(a => a.addEventListener("click", closeFn));
      document.addEventListener("keydown", e => { if (e.key==="Escape"&&open) closeFn(); });
    }

    /* ─── FIREBASE AUTH ─── */
    function initFirebase() {
      if (typeof firebase === "undefined") return;
      if (!firebase.apps.length) {
        firebase.initializeApp({
          apiKey:"AIzaSyC-uRePD86sTpCRgjPsjhpOp-lzTNNF8Zg",
          authDomain:"xedge-1da3a.firebaseapp.com",
          projectId:"xedge-1da3a",
          storageBucket:"xedge-1da3a.appspot.com",
          messagingSenderId:"209657807080",
          appId:"1:209657807080:web:80180596d966b4667d895d"
        });
      }
      const auth = firebase.auth();
      const prov = new firebase.auth.GoogleAuthProvider();
      window.signInWithGoogle = () => auth.signInWithPopup(prov).catch(console.error);
      window.logoutUser = () => auth.signOut();
      auth.onAuthStateChanged(user => {
        const nav = document.getElementById("auth-area");
        if (!nav) return;
        if (user) {
          nav.innerHTML = `<div style="position:relative;">
            <img id="profileBtn" src="${user.photoURL}" alt="Profile" onerror="this.src='xedge-logo.png'"
              style="width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,.1);cursor:pointer;display:block;"/>
            <div id="profileMenu" style="display:none;position:absolute;right:0;top:calc(100%+8px);min-width:180px;background:#111827;border:1px solid rgba(255,255,255,.1);border-radius:14px;overflow:hidden;box-shadow:0 20px 40px rgba(0,0,0,.5);z-index:100;">
              <div style="padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);">
                <div style="font-weight:700;font-size:.9rem;">${user.displayName}</div>
                <div style="font-size:.78rem;color:#6b7280;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${user.email}</div>
              </div>
              <button onclick="logoutUser()" style="width:100%;text-align:left;padding:12px 16px;background:none;border:none;color:#f87171;cursor:pointer;font-size:.9rem;font-family:inherit;">Sign out</button>
            </div></div>`;
          setTimeout(() => {
            const btn = document.getElementById("profileBtn");
            const pm  = document.getElementById("profileMenu");
            if (!btn||!pm) return;
            btn.onclick = e => { e.stopPropagation(); pm.style.display = pm.style.display==="none"?"block":"none"; };
            document.addEventListener("click", e => { if (!pm.contains(e.target)&&e.target!==btn) pm.style.display="none"; });
          }, 0);
        } else {
          nav.innerHTML = `<button onclick="signInWithGoogle()" style="border:1px solid rgba(59,130,246,.4);padding:7px 18px;border-radius:100px;background:none;color:#60a5fa;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:600;">Sign In</button>`;
        }
      });
    }

    /* ─── BOOT ─── */
    async function init() {
      initMobileMenu();
      primeSessionCache();
      showSkeletons();

      // Wait for tools.js to load (deferred — may not be ready yet)
      let waited = 0;
      while (typeof getTools !== "function" && waited < 5000) {
        await new Promise(r => setTimeout(r, 50));
        waited += 50;
      }

      if (typeof getTools !== "function") {
        document.getElementById("toolsContainer").innerHTML =
          `<div class="xe-empty" role="alert"><h3>Could not load tools</h3><p>Please refresh.</p></div>`;
        return;
      }

      try { ALL = await getTools(); }
      catch(e) { ALL = []; console.warn("XEdge Explore: fetch failed:", e.message); }

      FILTERED = ALL;
      const c = document.getElementById("toolsContainer");
      if (c) c.innerHTML = "";
      IDX = 0;
      renderBatch();
      setupObserver();

      const input = document.getElementById("toolSearch");
      if (input) {
        input.addEventListener("input", () => {
          clearTimeout(searchTimer);
          searchTimer = setTimeout(() => applySearch(input.value), 180);
        });
      }

      // Firebase poll
      let tries = 0;
      const poll = setInterval(() => {
        if (typeof firebase !== "undefined") { clearInterval(poll); initFirebase(); }
        if (++tries > 30) clearInterval(poll);
      }, 300);
    }

    // Single init — no double-call
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }

  })();
  </script>

</body>
</html>
